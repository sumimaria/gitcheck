<div class="card">
    <h2>Star Auditor</h2>
    <button onclick="runAudit()">Run Audit</button>

    <div id="status"></div>
    
    <div id="resultsGrid" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
        <div>
            <h4 style="color:#1a7f37">Starred ⭐</h4>
            <div id="starredList"></div>
        </div>
        <div>
            <h4 style="color:#cf222e">Not Starred ❌</h4>
            <div id="notStarredList"></div>
        </div>
    </div>
</div>

<style>
    /* New styles for the lists */
    .item { padding: 5px 8px; margin: 4px 0; border-radius: 4px; font-size: 13px; border: 1px solid #eee; }
    .is-starred { background: #dafbe1; border-color: #4ac26b; color: #1a7f37; }
    .is-not-starred { background: #fff1f0; border-color: #ffccc7; color: #cf222e; }
</style>

<script>
    async function runAudit() {
        const repo = document.getElementById('repoInput').value.trim();
        const singleUser = document.getElementById('singleUser').value.trim();
        const fileInput = document.getElementById('fileInput');
        
        let userArray = singleUser ? [singleUser] : [];
        if (fileInput.files.length > 0) {
            const text = await fileInput.files[0].text();
            const fileUsers = text.split(/[\n,]+/).map(u => u.trim()).filter(u => u);
            userArray = [...userArray, ...fileUsers];
        }

        const status = document.getElementById('status');
        const starredDiv = document.getElementById('starredList');
        const notStarredDiv = document.getElementById('notStarredList');

        status.innerText = "Auditing stars...";
        starredDiv.innerHTML = "";
        notStarredDiv.innerHTML = "";

        try {
            const response = await fetch('/api/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ repo, users: userArray })
            });
            const data = await response.json();

            status.innerHTML = `Checked <b>${data.totalChecked}</b> users.`;
            
            data.starred.forEach(name => {
                starredDiv.innerHTML += `<div class="item is-starred">${name}</div>`;
            });

            data.notStarred.forEach(name => {
                notStarredDiv.innerHTML += `<div class="item is-not-starred">${name}</div>`;
            });

        } catch (err) {
            status.innerText = "Error running audit.";
        }
    }
</script>
